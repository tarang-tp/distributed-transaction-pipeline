syntax = "proto3";

package raft;

// Mirrors raft/types.py exactly. `command` on LogEntry is an opaque,
// pickled Python object (see coordinator/grpc/serialization.py) -- fine
// for a cluster where every node runs the same trusted Python code, not
// meant for cross-language interop or untrusted input.
message LogEntry {
  int64 term = 1;
  int64 index = 2;
  bytes command = 3;
}

message RequestVoteArgs {
  int64 term = 1;
  string candidate_id = 2;
  int64 last_log_index = 3;
  int64 last_log_term = 4;
}

message RequestVoteReply {
  int64 term = 1;
  bool vote_granted = 2;
  string voter_id = 3;
}

message PreVoteArgs {
  int64 term = 1;
  string candidate_id = 2;
  int64 last_log_index = 3;
  int64 last_log_term = 4;
}

message PreVoteReply {
  int64 term = 1;
  bool vote_granted = 2;
  string voter_id = 3;
}

message AppendEntriesArgs {
  int64 term = 1;
  string leader_id = 2;
  int64 prev_log_index = 3;
  int64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  int64 leader_commit = 6;
}

message AppendEntriesReply {
  int64 term = 1;
  bool success = 2;
  string responder_id = 3;
  int64 match_index = 4;
  int64 conflict_index = 5;
  int64 conflict_term = 6;
}

message ProposeRequest {
  bytes command = 1;
}

message ProposeReply {
  bool accepted = 1;  // false if this node isn't the leader
  int64 term = 2;
  int64 index = 3;
  string leader_hint = 4;  // this node's best guess at the current leader, if known
}

service RaftService {
  rpc RequestVote(RequestVoteArgs) returns (RequestVoteReply);
  rpc PreVote(PreVoteArgs) returns (PreVoteReply);
  rpc AppendEntries(AppendEntriesArgs) returns (AppendEntriesReply);
  // Client-facing: propose a command directly to whichever node receives
  // this call. Non-leaders reply accepted=false with a leader_hint so a
  // real out-of-process client can redirect, mirroring how RaftCluster's
  // in-process propose() already finds and retries against the leader.
  rpc Propose(ProposeRequest) returns (ProposeReply);
}
